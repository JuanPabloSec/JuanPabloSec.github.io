<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leszek Papierz — AI Creative Studio</title>
<meta name="description" content="Reklamy wideo i grafiki reklamowe tworzone z użyciem AI. Szybko, skutecznie, dla małych biznesów i lokalnych przedsiębiorców.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080a0f;
    --bg2: #0d1018;
    --bg3: #111520;
    --accent: #00e5ff;
    --accent2: #7b61ff;
    --accent3: #ff4d6d;
    --text: #e8eaf0;
    --muted: #6b7280;
    --border: rgba(255,255,255,0.07);
    --card: rgba(255,255,255,0.04);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    overflow-x: hidden;
    line-height: 1.6;
  }

  /* NOISE OVERLAY */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
    opacity: 0.4;
  }

  /* GLOW ORBS */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(120px);
    pointer-events: none;
    z-index: 0;
  }
  .orb-1 { width: 600px; height: 600px; background: rgba(0,229,255,0.06); top: -200px; right: -200px; }
  .orb-2 { width: 500px; height: 500px; background: rgba(123,97,255,0.07); bottom: 200px; left: -150px; }

  /* NAV */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 1.2rem 2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(8,10,15,0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    transition: all 0.3s;
  }

  .nav-logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.15rem;
    letter-spacing: -0.02em;
    color: var(--text);
    text-decoration: none;
  }
  .nav-logo span { color: var(--accent); }

  .nav-links {
    display: flex;
    gap: 2rem;
    list-style: none;
    align-items: center;
  }

  .nav-links a {
    color: var(--muted);
    text-decoration: none;
    font-size: 0.875rem;
    font-weight: 400;
    letter-spacing: 0.02em;
    transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--text); }

  .nav-cta {
    background: var(--accent);
    color: #080a0f !important;
    padding: 0.5rem 1.2rem;
    border-radius: 6px;
    font-weight: 500 !important;
    transition: opacity 0.2s !important;
  }
  .nav-cta:hover { opacity: 0.85; color: #080a0f !important; }

  /* HAMBURGER */
  .hamburger {
    display: none;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
    background: none;
    border: none;
    padding: 4px;
  }
  .hamburger span {
    display: block;
    width: 24px;
    height: 2px;
    background: var(--text);
    border-radius: 2px;
    transition: all 0.3s;
  }

  /* MOBILE NAV */
  .mobile-nav {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(8,10,15,0.97);
    z-index: 99;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 2rem;
  }
  .mobile-nav.open { display: flex; }
  .mobile-nav a {
    font-family: 'Syne', sans-serif;
    font-size: 2rem;
    font-weight: 700;
    color: var(--text);
    text-decoration: none;
    letter-spacing: -0.02em;
    transition: color 0.2s;
  }
  .mobile-nav a:hover { color: var(--accent); }
  .mobile-nav-close {
    position: absolute;
    top: 1.5rem; right: 2rem;
    background: none; border: none;
    color: var(--muted);
    font-size: 1.8rem;
    cursor: pointer;
  }

  /* HERO */
  .hero {
    min-height: 100vh;
    display: flex;
    align-items: center;
    padding: 8rem 2rem 4rem;
    position: relative;
    max-width: 1200px;
    margin: 0 auto;
  }

  .hero-content { max-width: 760px; position: relative; z-index: 1; }

  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    background: rgba(0,229,255,0.08);
    border: 1px solid rgba(0,229,255,0.2);
    color: var(--accent);
    padding: 0.35rem 0.85rem;
    border-radius: 100px;
    font-size: 0.78rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 1.5rem;
    animation: fadeUp 0.6s ease both;
  }
  .hero-badge::before {
    content: '';
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(2.6rem, 6vw, 5rem);
    line-height: 1.05;
    letter-spacing: -0.03em;
    margin-bottom: 1.5rem;
    animation: fadeUp 0.6s 0.1s ease both;
  }

  h1 .accent { color: var(--accent); }
  h1 .accent2 { color: var(--accent2); }

  .hero-sub {
    font-size: clamp(1rem, 2vw, 1.2rem);
    color: var(--muted);
    max-width: 520px;
    margin-bottom: 2.5rem;
    line-height: 1.7;
    animation: fadeUp 0.6s 0.2s ease both;
  }

  .hero-actions {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    animation: fadeUp 0.6s 0.3s ease both;
  }

  .btn-primary {
    background: var(--accent);
    color: #080a0f;
    padding: 0.85rem 2rem;
    border-radius: 8px;
    font-weight: 500;
    font-size: 0.95rem;
    text-decoration: none;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,229,255,0.25); }

  .btn-outline {
    background: transparent;
    color: var(--text);
    padding: 0.85rem 2rem;
    border-radius: 8px;
    font-weight: 400;
    font-size: 0.95rem;
    text-decoration: none;
    border: 1px solid var(--border);
    transition: all 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
  }
  .btn-outline:hover { border-color: rgba(255,255,255,0.2); background: var(--card); }

  .hero-scroll {
    position: absolute;
    bottom: 2.5rem;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
    color: var(--muted);
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    animation: fadeUp 0.6s 0.5s ease both;
  }
  .scroll-line {
    width: 1px;
    height: 40px;
    background: linear-gradient(to bottom, var(--muted), transparent);
    animation: scrollLine 2s infinite;
  }
  @keyframes scrollLine {
    0% { transform: scaleY(0); transform-origin: top; }
    50% { transform: scaleY(1); transform-origin: top; }
    51% { transform: scaleY(1); transform-origin: bottom; }
    100% { transform: scaleY(0); transform-origin: bottom; }
  }

  /* STATS */
  .stats-bar {
    background: var(--bg2);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 2.5rem 2rem;
  }
  .stats-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 2rem;
    text-align: center;
  }
  .stat-num {
    font-family: 'Syne', sans-serif;
    font-size: 2.5rem;
    font-weight: 800;
    color: var(--accent);
    letter-spacing: -0.03em;
    line-height: 1;
  }
  .stat-label {
    color: var(--muted);
    font-size: 0.85rem;
    margin-top: 0.3rem;
  }

  /* SECTIONS */
  section { position: relative; z-index: 1; }

  .section-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 6rem 2rem;
  }

  .section-tag {
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 1rem;
  }

  h2 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(2rem, 4vw, 3rem);
    letter-spacing: -0.03em;
    line-height: 1.1;
    margin-bottom: 1rem;
  }

  .section-sub {
    color: var(--muted);
    font-size: 1.05rem;
    max-width: 520px;
    line-height: 1.7;
    margin-bottom: 3.5rem;
  }

  /* SERVICES */
  .services-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 1.5rem;
  }

  .service-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }
  .service-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(0,229,255,0.04) 0%, transparent 60%);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .service-card:hover { border-color: rgba(0,229,255,0.2); transform: translateY(-4px); }
  .service-card:hover::before { opacity: 1; }

  .service-icon {
    font-size: 2rem;
    margin-bottom: 1.2rem;
    display: block;
  }
  .service-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1.2rem;
    margin-bottom: 0.75rem;
  }
  .service-desc {
    color: var(--muted);
    font-size: 0.9rem;
    line-height: 1.7;
  }
  .service-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-top: 1.2rem;
  }
  .tag {
    background: rgba(0,229,255,0.07);
    color: var(--accent);
    border: 1px solid rgba(0,229,255,0.15);
    padding: 0.2rem 0.7rem;
    border-radius: 100px;
    font-size: 0.75rem;
    font-weight: 500;
  }

  /* PROCESS */
  .process-bg { background: var(--bg2); }

  .process-steps {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 0;
    position: relative;
  }

  .process-step {
    padding: 2rem;
    position: relative;
  }
  .process-step:not(:last-child)::after {
    content: '→';
    position: absolute;
    right: -0.5rem;
    top: 2.3rem;
    color: var(--muted);
    font-size: 1.2rem;
  }

  .step-num {
    font-family: 'Syne', sans-serif;
    font-size: 3rem;
    font-weight: 800;
    color: rgba(0,229,255,0.12);
    line-height: 1;
    margin-bottom: 0.5rem;
  }
  .step-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    margin-bottom: 0.5rem;
  }
  .step-desc {
    color: var(--muted);
    font-size: 0.875rem;
    line-height: 1.6;
  }

  /* PORTFOLIO */
  .portfolio-grid {
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    gap: 1.5rem;
  }

  .portfolio-item {
    border-radius: 12px;
    overflow: hidden;
    position: relative;
    cursor: pointer;
    background: var(--bg3);
    border: 1px solid var(--border);
    aspect-ratio: 16/9;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .portfolio-item:nth-child(1) { grid-column: span 8; }
  .portfolio-item:nth-child(2) { grid-column: span 4; }
  .portfolio-item:nth-child(3) { grid-column: span 4; }
  .portfolio-item:nth-child(4) { grid-column: span 4; }
  .portfolio-item:nth-child(5) { grid-column: span 4; }

  .portfolio-item .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(8,10,15,0.9) 0%, transparent 50%);
    opacity: 0;
    transition: opacity 0.3s;
    display: flex;
    align-items: flex-end;
    padding: 1.5rem;
  }
  .portfolio-item:hover .overlay { opacity: 1; }
  .overlay-text { color: var(--text); }
  .overlay-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.95rem; }
  .overlay-type { color: var(--accent); font-size: 0.8rem; }

  .portfolio-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.75rem;
    color: var(--muted);
  }
  .portfolio-placeholder .icon { font-size: 2.5rem; opacity: 0.3; }
  .portfolio-placeholder span { font-size: 0.8rem; }

  /* PRICING */
  .pricing-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 1.5rem;
    margin-top: 3rem;
  }

  .pricing-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2.5rem 2rem;
    position: relative;
    transition: all 0.3s;
  }
  .pricing-card.featured {
    border-color: rgba(0,229,255,0.3);
    background: rgba(0,229,255,0.05);
  }
  .pricing-card.featured::before {
    content: 'Najpopularniejszy';
    position: absolute;
    top: -12px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--accent);
    color: #080a0f;
    padding: 0.2rem 1rem;
    border-radius: 100px;
    font-size: 0.75rem;
    font-weight: 600;
    white-space: nowrap;
  }
  .pricing-card:hover { transform: translateY(-4px); }

  .plan-name {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1.1rem;
    margin-bottom: 0.5rem;
  }
  .plan-price {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 2.8rem;
    letter-spacing: -0.04em;
    line-height: 1;
    margin: 1rem 0;
    color: var(--accent);
  }
  .plan-price small {
    font-size: 1rem;
    color: var(--muted);
    font-weight: 300;
  }
  .plan-desc { color: var(--muted); font-size: 0.875rem; margin-bottom: 1.5rem; line-height: 1.6; }
  .plan-features { list-style: none; display: flex; flex-direction: column; gap: 0.75rem; margin-bottom: 2rem; }
  .plan-features li {
    display: flex;
    align-items: flex-start;
    gap: 0.6rem;
    font-size: 0.9rem;
  }
  .plan-features li::before {
    content: '✓';
    color: var(--accent);
    font-weight: 700;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .plan-btn {
    display: block;
    text-align: center;
    padding: 0.85rem;
    border-radius: 8px;
    font-weight: 500;
    font-size: 0.9rem;
    text-decoration: none;
    transition: all 0.2s;
  }
  .plan-btn-outline {
    border: 1px solid var(--border);
    color: var(--text);
  }
  .plan-btn-outline:hover { border-color: rgba(0,229,255,0.3); }
  .plan-btn-filled {
    background: var(--accent);
    color: #080a0f;
  }
  .plan-btn-filled:hover { opacity: 0.85; }

  /* TATTOO BANNER */
  .tattoo-banner {
    background: linear-gradient(135deg, rgba(123,97,255,0.1) 0%, rgba(255,77,109,0.08) 100%);
    border: 1px solid rgba(123,97,255,0.2);
    border-radius: 20px;
    padding: 4rem 3rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 2rem;
    flex-wrap: wrap;
    position: relative;
    overflow: hidden;
  }
  .tattoo-banner::before {
    content: '🖋';
    position: absolute;
    right: 2rem;
    top: 50%;
    transform: translateY(-50%);
    font-size: 8rem;
    opacity: 0.06;
  }
  .tattoo-banner-text h3 {
    font-family: 'Syne', sans-serif;
    font-size: 1.8rem;
    font-weight: 800;
    letter-spacing: -0.02em;
    margin-bottom: 0.5rem;
  }
  .tattoo-banner-text p {
    color: var(--muted);
    max-width: 400px;
  }
  .tattoo-btn {
    background: linear-gradient(135deg, var(--accent2), var(--accent3));
    color: #fff;
    padding: 0.9rem 2.2rem;
    border-radius: 8px;
    font-weight: 500;
    text-decoration: none;
    white-space: nowrap;
    transition: all 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    flex-shrink: 0;
  }
  .tattoo-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(123,97,255,0.3); }

  /* ABOUT */
  .about-bg { background: var(--bg2); }

  .about-inner {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 5rem;
    align-items: center;
  }

  .about-visual {
    aspect-ratio: 1;
    border-radius: 20px;
    background: var(--bg3);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .about-visual::before {
    content: '';
    position: absolute;
    width: 200px;
    height: 200px;
    background: radial-gradient(circle, rgba(0,229,255,0.15), transparent 70%);
    top: 20%;
    left: 20%;
  }
  .about-avatar {
    font-size: 5rem;
    position: relative;
    z-index: 1;
  }

  .about-text .section-tag { margin-bottom: 0.5rem; }
  .about-text h2 { margin-bottom: 1rem; }
  .about-text p {
    color: var(--muted);
    line-height: 1.8;
    margin-bottom: 1rem;
  }

  .tech-stack {
    display: flex;
    flex-wrap: wrap;
    gap: 0.6rem;
    margin-top: 1.5rem;
  }
  .tech-pill {
    background: var(--card);
    border: 1px solid var(--border);
    padding: 0.35rem 0.9rem;
    border-radius: 100px;
    font-size: 0.8rem;
    color: var(--muted);
  }

  /* TESTIMONIALS */
  .testimonials-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 1.5rem;
  }

  .testimonial-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem;
  }
  .testimonial-stars { color: #ffd700; margin-bottom: 1rem; font-size: 0.9rem; }
  .testimonial-text {
    color: var(--muted);
    font-size: 0.925rem;
    line-height: 1.7;
    font-style: italic;
    margin-bottom: 1.5rem;
  }
  .testimonial-author { display: flex; align-items: center; gap: 0.75rem; }
  .author-avatar {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: var(--bg3);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
  }
  .author-name { font-weight: 500; font-size: 0.9rem; }
  .author-role { color: var(--muted); font-size: 0.8rem; }

  /* FAQ */
  .faq-list { max-width: 720px; }

  .faq-item {
    border-bottom: 1px solid var(--border);
  }
  .faq-question {
    width: 100%;
    background: none;
    border: none;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 400;
    padding: 1.5rem 0;
    text-align: left;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 1rem;
    transition: color 0.2s;
  }
  .faq-question:hover { color: var(--accent); }
  .faq-arrow { transition: transform 0.3s; font-style: normal; flex-shrink: 0; }
  .faq-item.open .faq-arrow { transform: rotate(180deg); }
  .faq-answer {
    display: none;
    color: var(--muted);
    font-size: 0.9rem;
    line-height: 1.8;
    padding-bottom: 1.5rem;
  }
  .faq-item.open .faq-answer { display: block; }

  /* CONTACT */
  .contact-bg { background: var(--bg2); }

  .contact-inner {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 5rem;
  }

  .contact-info h2 { margin-bottom: 1rem; }
  .contact-info p { color: var(--muted); line-height: 1.7; margin-bottom: 2rem; }

  .contact-links { display: flex; flex-direction: column; gap: 1rem; }
