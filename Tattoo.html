<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leszek Papierz — Tattoo Studio</title>
<meta name="description" content="Tatuaż artystyczny — niestandardowe projekty, unikalne wzory. Leszek Papierz Tattoo Studio.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #070707;
    --bg2: #0c0c0c;
    --bg3: #111111;
    --accent: #c8a96e;
    --accent2: #e8d5a3;
    --accent3: #ff4d6d;
    --text: #e8e4dc;
    --muted: #6b6b6b;
    --border: rgba(255,255,255,0.07);
    --card: rgba(255,255,255,0.03);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    overflow-x: hidden;
    line-height: 1.6;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
    opacity: 0.5;
  }

  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(140px);
    pointer-events: none;
    z-index: 0;
  }
  .orb-1 { width: 500px; height: 500px; background: rgba(200,169,110,0.06); top: -100px; right: -150px; }
  .orb-2 { width: 400px; height: 400px; background: rgba(200,169,110,0.04); bottom: 100px; left: -100px; }

  /* NAV */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 1.2rem 2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(7,7,7,0.9);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
  }

  .nav-logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.1rem;
    color: var(--text);
    text-decoration: none;
    letter-spacing: -0.02em;
  }
  .nav-logo span { color: var(--accent); }

  .nav-links {
    display: flex;
    gap: 2rem;
    list-style: none;
    align-items: center;
  }
  .nav-links a {
    color: var(--muted);
    text-decoration: none;
    font-size: 0.875rem;
    transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--text); }

  .nav-back {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    color: var(--muted) !important;
    font-size: 0.85rem !important;
    background: var(--card);
    border: 1px solid var(--border);
    padding: 0.45rem 0.9rem;
    border-radius: 6px;
    transition: all 0.2s !important;
  }
  .nav-back:hover { color: var(--text) !important; border-color: rgba(200,169,110,0.25) !important; }

  .hamburger {
    display: none;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
    background: none;
    border: none;
    padding: 4px;
  }
  .hamburger span {
    display: block;
    width: 24px;
    height: 2px;
    background: var(--text);
    border-radius: 2px;
  }

  .mobile-nav {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(7,7,7,0.98);
    z-index: 99;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 2rem;
  }
  .mobile-nav.open { display: flex; }
  .mobile-nav a {
    font-family: 'Syne', sans-serif;
    font-size: 2rem;
    font-weight: 700;
    color: var(--text);
    text-decoration: none;
  }
  .mobile-nav a:hover { color: var(--accent); }
  .mobile-nav-close {
    position: absolute;
    top: 1.5rem; right: 2rem;
    background: none; border: none;
    color: var(--muted);
    font-size: 1.8rem;
    cursor: pointer;
  }

  /* HERO */
  .hero {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 8rem 2rem 4rem;
    position: relative;
    text-align: center;
    overflow: hidden;
  }

  .hero-bg-text {
    position: absolute;
    font-family: 'Syne', sans-serif;
    font-size: clamp(6rem, 18vw, 18rem);
    font-weight: 800;
    color: rgba(200,169,110,0.03);
    letter-spacing: -0.05em;
    user-select: none;
    pointer-events: none;
    white-space: nowrap;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  .hero-content { position: relative; z-index: 1; max-width: 720px; }

  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    background: rgba(200,169,110,0.08);
    border: 1px solid rgba(200,169,110,0.2);
    color: var(--accent);
    padding: 0.35rem 0.85rem;
    border-radius: 100px;
    font-size: 0.78rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 2rem;
    animation: fadeUp 0.6s ease both;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(3rem, 8vw, 7rem);
    line-height: 0.95;
    letter-spacing: -0.04em;
    margin-bottom: 1.5rem;
    animation: fadeUp 0.6s 0.1s ease both;
  }

  .hero-sub {
    color: var(--muted);
    font-size: 1.1rem;
    line-height: 1.7;
    margin-bottom: 2.5rem;
    animation: fadeUp 0.6s 0.2s ease both;
  }

  .hero-actions {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    justify-content: center;
    animation: fadeUp 0.6s 0.3s ease both;
  }

  .btn-primary {
    background: var(--accent);
    color: #070707;
    padding: 0.9rem 2rem;
    border-radius: 8px;
    font-weight: 500;
    font-size: 0.95rem;
    text-decoration: none;
    transition: all 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(200,169,110,0.25); }

  .btn-outline {
    background: transparent;
    color: var(--text);
    padding: 0.9rem 2rem;
    border-radius: 8px;
    font-weight: 400;
    font-size: 0.95rem;
    text-decoration: none;
    border: 1px solid var(--border);
    transition: all 0.2s;
  }
  .btn-outline:hover { border-color: rgba(200,169,110,0.25); }

  /* SECTIONS */
  section { position: relative; z-index: 1; }

  .section-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 6rem 2rem;
  }

  .section-tag {
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 1rem;
  }

  h2 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(2rem, 4vw, 3rem);
    letter-spacing: -0.03em;
    line-height: 1.1;
    margin-bottom: 1rem;
  }

  .section-sub {
    color: var(--muted);
    font-size: 1.05rem;
    max-width: 520px;
    line-height: 1.7;
    margin-bottom: 3rem;
  }

  /* PORTFOLIO / GALLERY */
  .gallery-filter {
    display: flex;
    gap: 0.75rem;
    flex-wrap: wrap;
    margin-bottom: 2.5rem;
  }

  .filter-btn {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 0.45rem 1.1rem;
    border-radius: 100px;
    font-size: 0.85rem;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
  }
  .filter-btn:hover, .filter-btn.active {
    background: rgba(200,169,110,0.1);
    border-color: rgba(200,169,110,0.3);
    color: var(--accent);
  }

  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1rem;
  }

  .gallery-item {
    position: relative;
    border-radius: 12px;
    overflow: hidden;
    background: var(--bg3);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.3s;
  }
  .gallery-item:hover { transform: scale(1.02); border-color: rgba(200,169,110,0.2); }

  .gallery-item:nth-child(3n+1) { aspect-ratio: 3/4; }
  .gallery-item:nth-child(3n+2) { aspect-ratio: 1; }
  .gallery-item:nth-child(3n+3) { aspect-ratio: 4/5; }

  .gallery-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.75rem;
    color: var(--muted);
    min-height: 240px;
  }
  .gallery-placeholder .icon { font-size: 2.5rem; opacity: 0.2; }
  .gallery-placeholder .label { font-size: 0.8rem; opacity: 0.5; }

  .gallery-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(7,7,7,0.9) 0%, transparent 50%);
    opacity: 0;
    transition: opacity 0.3s;
    display: flex;
    align-items: flex-end;
    padding: 1.2rem;
  }
  .gallery-item:hover .gallery-overlay { opacity: 1; }

  .gallery-info-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
  }
  .gallery-info-style {
    color: var(--accent);
    font-size: 0.78rem;
  }

  /* STYLES SECTION */
  .styles-bg { background: var(--bg2); }

  .styles-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 1.5rem;
  }

  .style-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem;
    transition: all 0.3s;
  }
  .style-card:hover {
    border-color: rgba(200,169,110,0.2);
    transform: translateY(-3px);
  }
  .style-icon { font-size: 2.2rem; margin-bottom: 1rem; display: block; }
  .style-name {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1.1rem;
    margin-bottom: 0.6rem;
  }
  .style-desc { color: var(--muted); font-size: 0.875rem; line-height: 1.7; }

  /* PRICING */
  .pricing-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 1.5rem;
  }

  .pricing-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2.5rem 2rem;
    transition: all 0.3s;
    position: relative;
  }
  .pricing-card:hover { transform: translateY(-4px); border-color: rgba(200,169,110,0.2); }
  .pricing-card.featured { border-color: rgba(200,169,110,0.3); background: rgba(200,169,110,0.04); }
  .pricing-card.featured::before {
    content: 'Najczęściej wybierane';
    position: absolute;
    top: -12px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--accent);
    color: #070707;
    padding: 0.2rem 1rem;
    border-radius: 100px;
    font-size: 0.75rem;
    font-weight: 600;
    white-space: nowrap;
  }

  .plan-name {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1.1rem;
    margin-bottom: 0.5rem;
  }
  .plan-price {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 2.5rem;
    color: var(--accent);
    letter-spacing: -0.04em;
    line-height: 1;
    margin: 1rem 0;
  }
  .plan-price small { font-size: 1rem; color: var(--muted); font-weight: 300; }
  .plan-from { font-size: 0.8rem; color: var(--muted); margin-bottom: 1rem; }
  .plan-desc { color: var(--muted); font-size: 0.875rem; margin-bottom: 1.5rem; line-height: 1.6; }
  .plan-features { list-style: none; display: flex; flex-direction: column; gap: 0.75rem; margin-bottom: 2rem; }
  .plan-features li {
    display: flex; align-items: flex-start; gap: 0.6rem; font-size: 0.9rem;
  }
  .plan-features li::before { content: '✓'; color: var(--accent); font-weight: 700; flex-shrink: 0; }

  .plan-btn {
    display: block;
    text-align: center;
    padding: 0.85rem;
    border-radius: 8px;
    font-weight: 500;
    font-size: 0.9rem;
    text-decoration: none;
    transition: all 0.2s;
    cursor: pointer;
  }
  .plan-btn-outline { border: 1px solid var(--border); color: var(--text); background: none; font-family: 'DM Sans', sans-serif; width: 100%; }
  .plan-btn-outline:hover { border-color: rgba(200,169,110,0.3); color: var(--accent); }
  .plan-btn-filled { background: var(--accent); color: #070707; border: none; font-family: 'DM Sans', sans-serif; width: 100%; }
  .plan-btn-filled:hover { opacity: 0.85; }

  /* PROCESS */
  .process-steps {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 2rem;
  }
  .process-step { position: relative; }
  .step-num {
    font-family: 'Syne', sans-serif;
    font-size: 3rem;
    font-weight: 800;
    color: rgba(200,169,110,0.1);
    line-height: 1;
    margin-bottom: 0.5rem;
  }
  .step-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    margin-bottom: 0.5rem;
    color: var(--accent2);
  }
  .step-desc { color: var(--muted); font-size: 0.875rem; line-height: 1.6; }

  /* CARE */
  .care-bg { background: var(--bg2); }
  .care-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 1.5rem;
  }
  .care-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.75rem;
  }
  .care-card h3 {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    margin-bottom: 0.75rem;
    color: var(--accent);
  }
  .care-card p { color: var(--muted); font-size: 0.875rem; line-height: 1.7; }
  .care-day { font-size: 0.75rem; color: var(--muted); margin-bottom: 0.3rem; letter-spacing: 0.05em; }

  /* ABOUT */
  .about-inner {
    display: grid;
    grid-template-columns: 1fr 1.2fr;
    gap: 5rem;
    align-items: center;
  }
  .about-visual {
    aspect-ratio: 3/4;
    border-radius: 20px;
    background: var(--bg3);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .about-visual::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 40%;
    background: linear-gradient(to top, var(--bg3), transparent);
  }
  .about-avatar { font-size: 5rem; }
  .about-text p { color: var(--muted); line-height: 1.8; margin-bottom: 1rem; }

  /* FAQ */
  .faq-list { max-width: 680px; }
  .faq-item { border-bottom: 1px solid var(--border); }
  .faq-question {
    width: 100%; background: none; border: none;
    color: var(--text); font-family: 'DM Sans', sans-serif;
    font-size: 1rem; font-weight: 400; padding: 1.5rem 0;
    text-align: left; cursor: pointer;
    display: flex; justify-content: space-between; align-items: center; gap: 1rem;
    transition: color 0.2s;
  }
  .faq-question:hover { color: var(--accent); }
  .faq-arrow { transition: transform 0.3s; font-style: normal; flex-shrink: 0; }
  .faq-item.open .faq-arrow { transform: rotate(180deg); }
  .faq-answer {
    display: none; color: var(--muted); font-size: 0.9rem;
    line-height: 1.8; padding-bottom: 1.5rem;
  }
  .faq-item.open .faq-answer { display: block; }

  /* CONTACT */
  .contact-inner {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 5rem;
  }
  .contact-info p { color: var(--muted); line-height: 1.7; margin-bottom: 2rem; }
  .contact-links { display: flex; flex-direction: column; gap: 1rem; }
  .contact-link {
    display: flex; align-items: center; gap: 1rem;
    padding: 1rem 1.2rem;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; text-decoration: none; color: var(--text); transition: all 0.2s;
  }
  .contact-link:hover { border-color: rgba(200,169,110,0.25); color: var(--accent); }
  .contact-link-icon { font-size: 1.3rem; }
  .contact-link-text { font-size: 0.9rem; }
  .contact-link-label { color: var(--muted); font-size: 0.78rem; }

  .contact-form { display: flex; flex-direction: column; gap: 1rem; }
  .form-group { display: flex; flex-direction: column; gap: 0.4rem; }
  .form-group label { font-size: 0.8rem; color: var(--muted); letter-spacing: 0.05em; }
  .form-control {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 0.85rem 1rem; color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 0.95rem;
    outline: none; transition: border-color 0.2s; width: 100%; resize: vertical;
  }
  .form-control:focus { border-color: rgba(200,169,110,0.35); }
  .form-control::placeholder { color: var(--muted); }
  textarea.form-control { min-height: 120px; }
  .form-note { font-size: 0.8rem; color: var(--muted); margin-top: -0.25rem; }
  .form-submit {
    background: var(--accent); color: #070707; border: none; border-radius: 10px;
    padding: 0.9rem; font-family: 'DM Sans', sans-serif; font-weight: 500;
    font-size: 0.95rem; cursor: pointer; transition: all 0.2s;
  }
  .form-submit:hover { opacity: 0.85; transform: translateY(-1px); }

  /* AI BANNER */
  .ai-banner {
    background: linear-gradient(135deg, rgba(0,229,255,0.07) 0%, rgba(123,97,255,0.06) 100%);
    border: 1px solid rgba(0,229,255,0.15);
    border-radius: 20px;
    padding: 4rem 3rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 2rem;
    flex-wrap: wrap;
  }
  .ai-banner-text h3 {
    font-family: 'Syne', sans-serif;
    font-size: 1.8rem; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 0.5rem;
  }
  .ai-banner-text p { color: var(--muted); max-width: 380px; }
  .ai-btn {
    background: linear-gradient(135deg, #00e5ff, #7b61ff);
    color: #fff; padding: 0.9rem 2.2rem; border-radius: 8px;
    font-weight: 500; text-decoration: none; white-space: nowrap;
    transition: all 0.2s; display: inline-flex; align-items: center; gap: 0.5rem; flex-shrink: 0;
  }
  .ai-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,229,255,0.25); }

  /* FOOTER */
  footer {
    border-top: 1px solid var(--border);
    padding: 3rem 2rem;
  }
  .footer-inner {
    max-width: 1200px; margin: 0 auto;
    display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1.5rem;
  }
  .footer-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.1rem; letter-spacing: -0.02em; }
  .footer-logo span { color: var(--accent); }
  .footer-copy { color: var(--muted); font-size: 0.85rem; }
  .footer-links { display: flex; gap: 1.5rem; }
  .footer-links a { color: var(--muted); font-size: 0.85rem; text-decoration: none; transition: color 0.2s; }
  .footer-links a:hover { color: var(--text); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .reveal { opacity: 0; transform: translateY(30px); transition: all 0.6s ease; }
  .reveal.visible { opacity: 1; transform: translateY(0); }

  @media (max-width: 900px) {
    .about-inner, .contact-inner { grid-template-columns: 1fr; gap: 2rem; }
    .about-visual { display: none; }
    .ai-banner { text-align: center; justify-content: center; }
  }
  @media (max-width: 640px) {
    .nav-links { display: none; }
    .hamburger { display: flex; }
    .hero { padding: 7rem 1.5rem 3rem; }
    .section-inner { padding: 4rem 1.5rem; }
    h1 { font-size: 3.5rem; }
  }
</style>
</head>
<body>
